app = "medical-ai-health"
primary_region = "sin"

[build]

[processes]
  app = "bash scripts/startup.sh"

[mounts]
  source = "chroma_data"
  destination = "/app/chroma_db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"